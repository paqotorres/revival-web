<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { width: 1080px; }

  body {
    background: #0a0a0a;
    background-image: radial-gradient(ellipse at top, rgba(34,197,94,0.22), transparent 55%);
    font-family: 'Inter', sans-serif;
    color: #f5f3ef;
  }

  .header {
    padding: 64px 64px 0;
  }

  .tag {
    color: #4ade80;
    font-family: 'Oswald', sans-serif;
    font-size: 24px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .title {
    font-family: 'Oswald', sans-serif;
    font-weight: 800;
    text-transform: uppercase;
    font-size: 120px;
    line-height: 0.88;
    color: #ffffff;
    letter-spacing: 0.01em;
  }

  .title span {
    background: linear-gradient(90deg, #4ade80, #22c55e);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .date {
    margin-top: 22px;
    display: inline-block;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 36px;
    letter-spacing: 0.04em;
    color: #f5f3ef;
    border-bottom: 3px solid #22c55e;
    padding-bottom: 8px;
  }

  .grid {
    margin-top: 48px;
    padding: 0 56px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 26px;
  }

  .card {
    background: #131313;
    border: 1px solid rgba(255,255,255,0.08);
    overflow: hidden;
    border-radius: 4px;
  }

  .card-photo-wrap {
    position: relative;
    width: 100%;
    background: #1c1c1c;
  }

  .card-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
  }

  .card-photo-fallback {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-photo-fallback span {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 64px;
    color: rgba(255,255,255,0.14);
  }

  .card-fade {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.15) 45%, transparent 65%);
  }

  .crests {
    position: absolute;
    left: 12px;
    bottom: 12px;
    display: flex;
    gap: 6px;
    z-index: 2;
  }

  .crest {
    width: 56px;
    height: 56px;
    object-fit: contain;
    background: rgba(255,255,255,0.95);
    border-radius: 50%;
    padding: 5px;
  }

  .card-info {
    padding: 16px 16px 20px;
  }

  .card-meta {
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #4ade80;
    margin-bottom: 4px;
  }

  .card-name {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    line-height: 1.08;
    color: #ffffff;
  }

  .footer {
    padding: 56px 0 64px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .footer img {
    height: 70px;
    opacity: 0.9;
  }
</style>
</head>
